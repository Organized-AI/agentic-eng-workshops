    <div id="root"></div>
  <script>
/* isolate the Catalogue Building section for embedding: ?view=catalogue
   hides the site nav + all sibling sections and lets #process fill the frame */
(function(){
  var want = location.search.indexOf('view=catalogue')>-1 || location.hash==='#catalogue' || location.hash==='#process';
  if(!want) return;
  function run(){
    var sec=document.getElementById('process'); if(!sec) return;
    var main=sec.parentElement;
    Array.prototype.forEach.call(main.children,function(c){ c.style.display = (c===sec)?'':'none'; });
    document.querySelectorAll('header,.topbar,footer').forEach(function(e){e.style.display='none';});
    var pg=document.querySelector('.page'); if(pg) pg.style.paddingTop='0';
    sec.style.margin='0';
    window.scrollTo(0,0);
    [100,500,1200].forEach(function(t){setTimeout(function(){window.dispatchEvent(new Event('resize'))},t)});
  }
  var n=0,iv=setInterval(function(){run(); if(++n>16)clearInterval(iv);},220);
  document.addEventListener('DOMContentLoaded',run);
  if('ResizeObserver'in window){document.addEventListener('DOMContentLoaded',function(){var r=document.getElementById('root'); if(r) new ResizeObserver(function(){window.dispatchEvent(new Event('resize'))}).observe(r);});}
})();
</script>
